_metadata:
  major_version: 2
  minor_version: 1

display_information:
  name: SMP Render Test Bot
  description: Test-only Slack app for validating markdown rendering behavior.
  background_color: "#2f7d32"

features:
  bot_user:
    display_name: smp-render-test-bot
    always_online: false

oauth_config:
  scopes:
    bot:
      - chat:write

settings:
  org_deploy_enabled: false
  socket_mode_enabled: false
  token_rotation_enabled: false
  incoming_webhooks:
    incoming_webhooks_enabled: false
  interactivity:
    is_enabled: false
