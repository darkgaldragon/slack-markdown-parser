name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run tests
        run: pytest -q --cov=slack_markdown_parser --cov-report=term-missing

  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Dependency audit (project deps only)
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          deps = pyproject.get("project", {}).get("dependencies", [])
          Path(".audit-requirements.txt").write_text("\n".join(deps) + "\n", encoding="utf-8")
          print(f"dependencies_to_audit={len(deps)}")
          PY
          if [ -s .audit-requirements.txt ]; then
            pip-audit -r .audit-requirements.txt
          else
            echo "No runtime dependencies to audit."
          fi
      - name: Regex secret scan (working tree)
        run: |
          set -euo pipefail
          SECRET_REGEX='(AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|xox[baprs]-[0-9A-Za-z-]{20,}|AIza[0-9A-Za-z\-_]{35}|-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----|aws_secret_access_key\s*[:=]\s*[A-Za-z0-9/+=]{20,})'
          if rg -n --hidden --glob '!.git' --pcre2 "$SECRET_REGEX" .; then
            echo "::error::Potential secret detected by regex gate."
            exit 1
          fi
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.28.0"
          INSTALL_DIR="${RUNNER_TEMP}/gitleaks-bin"
          mkdir -p "${INSTALL_DIR}"
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz -C "${INSTALL_DIR}" gitleaks
          chmod +x "${INSTALL_DIR}/gitleaks"
          echo "${INSTALL_DIR}" >> "$GITHUB_PATH"
      - name: Gitleaks scan (working tree)
        run: gitleaks detect --no-git --source . --redact
      - name: Gitleaks scan (git history)
        run: gitleaks git --redact --log-opts="--all"

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          python -m build
      - name: Twine check
        run: twine check dist/*
