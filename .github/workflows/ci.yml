name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Ruff
        run: ruff check .
      - name: Black
        run: black --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Run tests
        run: pytest -q --cov=slack_markdown_parser --cov-report=term-missing

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Dependency audit (project deps only)
        run: |
          python - <<'PY'
          import tomllib
          from pathlib import Path

          pyproject = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          deps = pyproject.get("project", {}).get("dependencies", [])
          Path(".audit-requirements.txt").write_text("\n".join(deps) + "\n", encoding="utf-8")
          print(f"dependencies_to_audit={len(deps)}")
          PY
          if [ -s .audit-requirements.txt ]; then
            pip-audit -r .audit-requirements.txt
          else
            echo "No runtime dependencies to audit."
          fi
      - name: Regex secret scan (working tree)
        run: |
          set -euo pipefail
          python - <<'PY'
          import pathlib
          import re
          import sys

          secret_regex = re.compile(
              r"(AKIA[0-9A-Z]{16}|ASIA[0-9A-Z]{16}|xox[baprs]-[0-9A-Za-z-]{20,}|AIza[0-9A-Za-z\-_]{35}|-----BEGIN (RSA|EC|DSA|OPENSSH) PRIVATE KEY-----|aws_secret_access_key\s*[:=]\s*[A-Za-z0-9/+=]{20,})"
          )
          excluded_dirs = {".git", ".venv", "venv", "__pycache__", "build", "dist", "python"}
          hits = []

          for path in pathlib.Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if any(part in excluded_dirs for part in path.parts):
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except Exception:
                  continue
              for match in secret_regex.finditer(text):
                  line = text.count("\n", 0, match.start()) + 1
                  snippet = match.group(0)[:80]
                  hits.append((str(path), line, snippet))
                  if len(hits) >= 20:
                      break
              if len(hits) >= 20:
                  break

          if hits:
              print("::error::Potential secret detected by regex gate.")
              for file_path, line_no, snippet in hits:
                  print(f"{file_path}:{line_no}: {snippet}")
              sys.exit(1)

          print("No secret-like patterns detected by regex gate.")
          PY
      - name: Install gitleaks
        run: |
          set -euo pipefail
          VERSION="8.28.0"
          ARCHIVE="gitleaks_${VERSION}_linux_x64.tar.gz"
          CHECKSUM_FILE="gitleaks_${VERSION}_checksums.txt"
          BASE_URL="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}"
          TMP_DIR="${RUNNER_TEMP}/gitleaks-download"
          INSTALL_DIR="${RUNNER_TEMP}/gitleaks-bin"
          mkdir -p "${TMP_DIR}"
          mkdir -p "${INSTALL_DIR}"

          curl --fail-with-body --retry 5 --retry-delay 2 --retry-all-errors -sSLo "${TMP_DIR}/${ARCHIVE}" "${BASE_URL}/${ARCHIVE}"
          curl --fail-with-body --retry 5 --retry-delay 2 --retry-all-errors -sSLo "${TMP_DIR}/${CHECKSUM_FILE}" "${BASE_URL}/${CHECKSUM_FILE}"
          (
            cd "${TMP_DIR}"
            checksum_line="$(grep -F "  ${ARCHIVE}" "${CHECKSUM_FILE}" || true)"
            if [ "$(printf '%s\n' "$checksum_line" | sed '/^$/d' | wc -l)" -ne 1 ]; then
              echo "Unexpected number of checksum lines for ${ARCHIVE}" >&2
              exit 1
            fi
            printf '%s\n' "$checksum_line" | sha256sum -c -
          )

          tar -xzf "${TMP_DIR}/${ARCHIVE}" -C "${INSTALL_DIR}" gitleaks
          chmod +x "${INSTALL_DIR}/gitleaks"
          echo "${INSTALL_DIR}" >> "$GITHUB_PATH"
      - name: Gitleaks scan (working tree)
        run: gitleaks detect --no-git --source . --redact
      - name: Gitleaks scan (git history)
        run: gitleaks git --redact --log-opts="--all"

  package-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Build package
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          python -m build
      - name: Twine check
        run: twine check dist/*
