name: Bug report
description: Report incorrect parsing or rendering behavior
title: "[Bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: textarea
    id: markdown_input
    attributes:
      label: Minimal markdown input
      description: Paste a small reproducible markdown snippet
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual output
      description: Produced Slack blocks or rendered result
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected output
      description: Expected blocks/result
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: e.g. 2.0.0
    validations:
      required: true
